<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" width="100%" height="100%">
    <defs>
        <!-- Arrowhead Marker for Current Vectors (Strictly Black) -->
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
            <path d="M 0 1 L 10 5 L 0 9 Z" fill="#000000" />
        </marker>
        
        <!-- Arrowhead Marker for Voltage Vectors (Offset to touch node edge perfectly) -->
        <marker id="v-arrow" viewBox="0 0 10 10" refX="13" refY="5" markerWidth="7" markerHeight="7" orient="auto">
            <path d="M 0 1 L 10 5 L 0 9 Z" fill="#000000" />
        </marker>
        
        <style>
            text {
                font-family: 'Segoe UI', Arial, sans-serif;
            }
            .node {
                fill: #d32f2f;
                font-weight: bold;
                font-size: 16px;
            }
            .voltage {
                fill: #000000;
                font-style: italic;
                font-size: 14px;
            }
            .current {
                fill: #000000;
                font-weight: bold;
                font-size: 16px;
            }
            .ax-v {
                fill: #888888;
                font-size: 12px;
            }
            .ax-i {
                fill: #000000;
                font-size: 12px;
                font-weight: bold;
            }
            .halo {
                paint-order: stroke fill;
                stroke: #ffffff;
                stroke-width: 6px;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
        </style>
    </defs>

    <!-- White Background -->
    <rect width="100%" height="100%" fill="#ffffff" />

    <!-- X and Y Axes -->
    <line x1="20" y1="450" x2="980" y2="450" stroke="#dddddd" stroke-width="1.5" />
    <line x1="500" y1="20" x2="500" y2="880" stroke="#dddddd" stroke-width="1.5" />

    <!-- Voltage Ticks (Outer, Gray) -->
    <path d="M 650 445 v 10 M 800 445 v 10 M 950 445 v 10 
             M 350 445 v 10 M 200 445 v 10 M 50 445 v 10 
             M 495 300 h 10 M 495 150 h 10 
             M 495 600 h 10 M 495 750 h 10" 
          stroke="#cccccc" fill="none" stroke-width="1.5" />

    <!-- Current Ticks (Inner, Black) -->
    <path d="M 700 445 v 10 M 900 445 v 10 
             M 300 445 v 10 M 100 445 v 10 
             M 495 250 h 10 M 495 50 h 10 
             M 495 650 h 10 M 495 850 h 10" 
          stroke="#000000" fill="none" stroke-width="1.5" />

    <!-- Voltage Topological Vectors (Solid Black Directed Arrows) -->
    <!-- U12 (Branch 5): points from 2 to 1 -->
    <line x1="811.85" y1="397.65" x2="500" y2="450" stroke="#000000" stroke-width="1.5" marker-end="url(#v-arrow)" />
    <!-- U24 (Branch 6): points from 4 to 2 -->
    <line x1="291.8" y1="601.65" x2="811.85" y2="397.65" stroke="#000000" stroke-width="1.5" marker-end="url(#v-arrow)" />
    <!-- U45 (Branch 1): points from 5 to 4 -->
    <line x1="483.2" y1="614.1" x2="291.8" y2="601.65" stroke="#000000" stroke-width="1.5" marker-end="url(#v-arrow)" />
    <!-- U56 (Branch 2): points from 6 to 5 -->
    <line x1="577.4" y1="370.5" x2="483.2" y2="614.1" stroke="#000000" stroke-width="1.5" marker-end="url(#v-arrow)" />
    <!-- U63 (Branch 3): points from 3 to 6 -->
    <line x1="659.9" y1="448.95" x2="577.4" y2="370.5" stroke="#000000" stroke-width="1.5" marker-end="url(#v-arrow)" />
    <!-- U31 (Branch 4): points from 1 to 3 -->
    <line x1="500" y1="450" x2="659.9" y2="448.95" stroke="#000000" stroke-width="1.5" marker-end="url(#v-arrow)" />
    <!-- U51 (Branch 7): points from 1 to 5 -->
    <line x1="500" y1="450" x2="483.2" y2="614.1" stroke="#000000" stroke-width="1.5" marker-end="url(#v-arrow)" />

    <!-- Current Vectors (from Origin 500,450) -->
    <!-- I1, I5, I6 -->
    <line x1="500" y1="450" x2="592.8" y2="456.0" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow)" />
    <!-- I2 -->
    <line x1="500" y1="450" x2="139.2" y2="310.4" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow)" />
    <!-- I3, I4 -->
    <line x1="500" y1="450" x2="521.6" y2="427.2" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow)" />
    <!-- I7 -->
    <line x1="500" y1="450" x2="571.2" y2="478.8" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow)" />

    <!-- Node Marker Dots -->
    <circle cx="500" cy="450" r="4.5" fill="#d32f2f" />
    <circle cx="811.85" cy="397.65" r="4.5" fill="#d32f2f" />
    <circle cx="659.9" cy="448.95" r="4.5" fill="#d32f2f" />
    <circle cx="291.8" cy="601.65" r="4.5" fill="#d32f2f" />
    <circle cx="483.2" cy="614.1" r="4.5" fill="#d32f2f" />
    <circle cx="577.4" cy="370.5" r="4.5" fill="#d32f2f" />

    <!-- ========================================== -->
    <!-- HALO BACKGROUND TEXT BLOCK                 -->
    <!-- ========================================== -->
    <g class="halo">
        <!-- Axis Titles -->
        <text x="980" y="440" font-size="12" font-style="italic" text-anchor="end">Re</text>
        <text x="510" y="20" font-size="12" font-style="italic">jIm</text>

        <!-- Voltage Ticks -->
        <text x="650" y="470" text-anchor="middle" class="ax-v">10 V</text>
        <text x="800" y="470" text-anchor="middle" class="ax-v">20 V</text>
        <text x="950" y="470" text-anchor="middle" class="ax-v">30 V</text>
        <text x="350" y="470" text-anchor="middle" class="ax-v">-10 V</text>
        <text x="200" y="470" text-anchor="middle" class="ax-v">-20 V</text>
        <text x="50"  y="470" text-anchor="middle" class="ax-v">-30 V</text>
        <text x="480" y="305" text-anchor="end" class="ax-v">10 V</text>
        <text x="480" y="155" text-anchor="end" class="ax-v">20 V</text>
        <text x="480" y="605" text-anchor="end" class="ax-v">-10 V</text>
        <text x="480" y="755" text-anchor="end" class="ax-v">-20 V</text>

        <!-- Current Ticks -->
        <text x="700" y="440" text-anchor="middle" class="ax-i">0.5 A</text>
        <text x="900" y="440" text-anchor="middle" class="ax-i">1.0 A</text>
        <text x="300" y="440" text-anchor="middle" class="ax-i">-0.5 A</text>
        <text x="100" y="440" text-anchor="middle" class="ax-i">-1.0 A</text>
        <text x="515" y="255" class="ax-i">0.5 A</text>
        <text x="515" y="55" class="ax-i">1.0 A</text>
        <text x="515" y="655" class="ax-i">-0.5 A</text>
        <text x="515" y="855" class="ax-i">-1.0 A</text>

        <!-- Node Labels -->
        <text x="485" y="435" class="node">1</text>
        <text x="825" y="390" class="node">2</text>
        <text x="675" y="455" class="node">3</text>
        <text x="270" y="625" class="node">4</text>
        <text x="485" y="635" class="node">5</text>
        <text x="585" y="355" class="node">6</text>

        <!-- Voltage Drop Labels -->
        <text x="655" y="410" class="voltage">U<tspan baseline-shift="sub" font-size="10">12</tspan></text>
        <text x="560" y="490" class="voltage">U<tspan baseline-shift="sub" font-size="10">24</tspan></text>
        <text x="387" y="625" class="voltage">U<tspan baseline-shift="sub" font-size="10">45</tspan></text>
        <text x="545" y="492" class="voltage">U<tspan baseline-shift="sub" font-size="10">56</tspan></text>
        <text x="630" y="400" class="voltage">U<tspan baseline-shift="sub" font-size="10">63</tspan></text>
        <text x="580" y="435" class="voltage">U<tspan baseline-shift="sub" font-size="10">31</tspan></text>
        <text x="465" y="535" class="voltage">U<tspan baseline-shift="sub" font-size="10">51</tspan></text>

        <!-- Current Labels -->
        <text x="600" y="475" class="current">I<tspan baseline-shift="sub" font-size="10">1</tspan>, I<tspan baseline-shift="sub" font-size="10">5</tspan>, I<tspan baseline-shift="sub" font-size="10">6</tspan></text>
        <text x="120" y="290" class="current">I<tspan baseline-shift="sub" font-size="10">2</tspan></text>
        <text x="530" y="415" class="current">I<tspan baseline-shift="sub" font-size="10">3</tspan>, I<tspan baseline-shift="sub" font-size="10">4</tspan></text>
        <text x="580" y="500" class="current">I<tspan baseline-shift="sub" font-size="10">7</tspan></text>
    </g>

    <!-- ========================================== -->
    <!-- READABLE FOREGROUND TEXT BLOCK             -->
    <!-- ========================================== -->
    <g>
        <!-- Axis Titles -->
        <text x="980" y="440" font-size="12" font-style="italic" fill="#888888" text-anchor="end">Re</text>
        <text x="510" y="20" font-size="12" font-style="italic" fill="#888888">jIm</text>

        <!-- Voltage Ticks -->
        <text x="650" y="470" text-anchor="middle" class="ax-v">10 V</text>
        <text x="800" y="470" text-anchor="middle" class="ax-v">20 V</text>
        <text x="950" y="470" text-anchor="middle" class="ax-v">30 V</text>
        <text x="350" y="470" text-anchor="middle" class="ax-v">-10 V</text>
        <text x="200" y="470" text-anchor="middle" class="ax-v">-20 V</text>
        <text x="50"  y="470" text-anchor="middle" class="ax-v">-30 V</text>
        <text x="480" y="305" text-anchor="end" class="ax-v">10 V</text>
        <text x="480" y="155" text-anchor="end" class="ax-v">20 V</text>
        <text x="480" y="605" text-anchor="end" class="ax-v">-10 V</text>
        <text x="480" y="755" text-anchor="end" class="ax-v">-20 V</text>

        <!-- Current Ticks -->
        <text x="700" y="440" text-anchor="middle" class="ax-i">0.5 A</text>
        <text x="900" y="440" text-anchor="middle" class="ax-i">1.0 A</text>
        <text x="300" y="440" text-anchor="middle" class="ax-i">-0.5 A</text>
        <text x="100" y="440" text-anchor="middle" class="ax-i">-1.0 A</text>
        <text x="515" y="255" class="ax-i">0.5 A</text>
        <text x="515" y="55" class="ax-i">1.0 A</text>
        <text x="515" y="655" class="ax-i">-0.5 A</text>
        <text x="515" y="855" class="ax-i">-1.0 A</text>

        <!-- Node Labels -->
        <text x="485" y="435" class="node">1</text>
        <text x="825" y="390" class="node">2</text>
        <text x="675" y="455" class="node">3</text>
        <text x="270" y="625" class="node">4</text>
        <text x="485" y="635" class="node">5</text>
        <text x="585" y="355" class="node">6</text>

        <!-- Voltage Drop Labels -->
        <text x="655" y="410" class="voltage">U<tspan baseline-shift="sub" font-size="10">12</tspan></text>
        <text x="560" y="490" class="voltage">U<tspan baseline-shift="sub" font-size="10">24</tspan></text>
        <text x="387" y="625" class="voltage">U<tspan baseline-shift="sub" font-size="10">45</tspan></text>
        <text x="545" y="492" class="voltage">U<tspan baseline-shift="sub" font-size="10">56</tspan></text>
        <text x="630" y="400" class="voltage">U<tspan baseline-shift="sub" font-size="10">63</tspan></text>
        <text x="580" y="435" class="voltage">U<tspan baseline-shift="sub" font-size="10">31</tspan></text>
        <text x="465" y="535" class="voltage">U<tspan baseline-shift="sub" font-size="10">51</tspan></text>

        <!-- Current Labels -->
        <text x="600" y="475" class="current">I<tspan baseline-shift="sub" font-size="10">1</tspan>, I<tspan baseline-shift="sub" font-size="10">5</tspan>, I<tspan baseline-shift="sub" font-size="10">6</tspan></text>
        <text x="120" y="290" class="current">I<tspan baseline-shift="sub" font-size="10">2</tspan></text>
        <text x="530" y="415" class="current">I<tspan baseline-shift="sub" font-size="10">3</tspan>, I<tspan baseline-shift="sub" font-size="10">4</tspan></text>
        <text x="580" y="500" class="current">I<tspan baseline-shift="sub" font-size="10">7</tspan></text>
    </g>
</svg>