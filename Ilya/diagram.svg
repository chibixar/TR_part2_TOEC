<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" width="100%" height="100%" style="background-color: white; font-family: sans-serif;">
    <defs>
        <!-- Arrowhead for Current vectors (black, solid) -->
        <marker id="arrow-i" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
        </marker>
        <!-- Arrowhead for Voltage drops (gray, solid) -->
        <marker id="arrow-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#444" />
        </marker>
        <!-- Arrowhead for Axes -->
        <marker id="arrow-axis" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#888" />
        </marker>
    </defs>

    <!-- ================= AXES ================= -->
    <g stroke="#888" stroke-width="1.5">
        <!-- X Axis (Real) -->
        <line x1="50" y1="450" x2="950" y2="450" marker-end="url(#arrow-axis)"/>
        <!-- Y Axis (Imaginary) -->
        <line x1="400" y1="850" x2="400" y2="50" marker-end="url(#arrow-axis)"/>
    </g>
    
    <!-- Axis Labels -->
    <text x="930" y="435" font-size="14" fill="#555" font-style="italic">+1</text>
    <text x="415" y="60" font-size="14" fill="#555" font-style="italic">+j</text>

    <!-- Ticks and Grid Labels -->
    <g font-size="11">
        <!-- X Axis Ticks -->
        <path d="M 40 445 L 40 455 M 160 445 L 160 455 M 280 445 L 280 455 M 520 445 L 520 455 M 640 445 L 640 455 M 760 445 L 760 455 M 880 445 L 880 455" stroke="#888" fill="none"/>
        
        <g text-anchor="middle">
            <g fill="#777">
                <text x="40" y="440">-300</text>
                <text x="160" y="440">-200</text>
                <text x="280" y="440">-100</text>
                <text x="520" y="440">100</text>
                <text x="640" y="440">200</text>
                <text x="760" y="440">300</text>
                <text x="880" y="440">400</text>
            </g>
            <g fill="black">
                <text x="40" y="468">-6.0</text>
                <text x="160" y="468">-4.0</text>
                <text x="280" y="468">-2.0</text>
                <text x="520" y="468">2.0</text>
                <text x="640" y="468">4.0</text>
                <text x="760" y="468">6.0</text>
                <text x="880" y="468">8.0</text>
            </g>
        </g>

        <!-- Y Axis Ticks -->
        <path d="M 395 90 L 405 90 M 395 210 L 405 210 M 395 330 L 405 330 M 395 570 L 405 570 M 395 690 L 405 690 M 395 810 L 405 810" stroke="#888" fill="none"/>
        
        <g alignment-baseline="middle">
            <g fill="#777" text-anchor="end">
                <text x="390" y="90">300</text>
                <text x="390" y="210">200</text>
                <text x="390" y="330">100</text>
                <text x="390" y="570">-100</text>
                <text x="390" y="690">-200</text>
                <text x="390" y="810">-300</text>
            </g>
            <g fill="black" text-anchor="start">
                <text x="410" y="90">6.0</text>
                <text x="410" y="210">4.0</text>
                <text x="410" y="330">2.0</text>
                <text x="410" y="570">-2.0</text>
                <text x="410" y="690">-4.0</text>
                <text x="410" y="810">-6.0</text>
            </g>
        </g>
    </g>

    <!-- ================= VOLTAGE TOPOLOGY (NODES & LINES) ================= -->
    <g stroke="#444" stroke-width="1.5" marker-end="url(#arrow-v)">
        <!-- 6 -> 5 -->
        <line x1="750.2" y1="143.4" x2="400" y2="450" />
        <!-- 6 -> 4 -->
        <line x1="750.2" y1="143.4" x2="469.8" y2="338.5" />
        <!-- 4 -> 1 -->
        <line x1="469.8" y1="338.5" x2="242.0" y2="396.0" />
        <!-- 1 -> 5 -->
        <line x1="242.0" y1="396.0" x2="400" y2="450" />
        <!-- 5 -> 2 -->
        <line x1="400" y1="450" x2="290.2" y2="793.0" />
        <!-- 2 -> 3 -->
        <line x1="290.2" y1="793.0" x2="332.9" y2="397.1" />
        <!-- 3 -> 6 -->
        <line x1="332.9" y1="397.1" x2="750.2" y2="143.4" />
    </g>

    <!-- ================= CURRENT VECTORS ================= -->
    <g stroke="black" stroke-width="2.5" marker-end="url(#arrow-i)">
        <!-- I1 -->
        <line x1="400" y1="450" x2="230.8" y2="171.6" />
        <!-- I2, I3, I4 -->
        <line x1="400" y1="450" x2="447.4" y2="311.4" />
        <!-- I5, I6 -->
        <line x1="400" y1="450" x2="638.2" y2="526.2" />
        <!-- I7 -->
        <line x1="400" y1="450" x2="590.8" y2="664.2" />
    </g>

    <!-- ================= LABELS ================= -->
    <!-- Voltage and Current Labels with White "Halo" for perfect readability -->
    <g font-size="16" font-style="italic" text-anchor="middle">
        
        <!-- ================= HALO BACKGROUND LAYER ================= -->
        <!-- Draws a thick white outline to cut the lines behind the text -->
        <g stroke="white" stroke-width="6" fill="white" stroke-linecap="round" stroke-linejoin="round">
            
            <!-- Voltages -->
            <!-- U36: Placed above its line -->
            <text x="500" y="250">U&#x0307;<tspan baseline-shift="sub" font-size="11">36</tspan></text>
            <!-- U64: Placed precisely on its line -->
            <text x="610" y="248">U&#x0307;<tspan baseline-shift="sub" font-size="11">64</tspan></text>
            <!-- U65: Placed slightly below its line -->
            <text x="640" y="300">U&#x0307;<tspan baseline-shift="sub" font-size="11">65</tspan></text>
            <!-- U41 -->
            <text x="356" y="372">U&#x0307;<tspan baseline-shift="sub" font-size="11">41</tspan></text>
            <!-- U15 -->
            <text x="321" y="428">U&#x0307;<tspan baseline-shift="sub" font-size="11">15</tspan></text>
            <!-- U52 -->
            <text x="365" y="621">U&#x0307;<tspan baseline-shift="sub" font-size="11">52</tspan></text>
            <!-- U23 -->
            <text x="265" y="595">U&#x0307;<tspan baseline-shift="sub" font-size="11">23</tspan></text>

            <!-- Currents -->
            <text x="260" y="180" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">1</tspan></text>
            <text x="460" y="295" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">2</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">3</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">4</tspan></text>
            <text x="650" y="540" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">5</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">6</tspan></text>
            <text x="610" y="675" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">7</tspan></text>
        </g>

        <!-- ================= TEXT FOREGROUND LAYER ================= -->
        <!-- Draws the actual black text directly over the halos -->
        
        <!-- Voltages -->
        <g fill="#222">
            <text x="500" y="250">U&#x0307;<tspan baseline-shift="sub" font-size="11">36</tspan></text>
            <text x="610" y="248">U&#x0307;<tspan baseline-shift="sub" font-size="11">64</tspan></text>
            <text x="640" y="300">U&#x0307;<tspan baseline-shift="sub" font-size="11">65</tspan></text>
            <text x="356" y="372">U&#x0307;<tspan baseline-shift="sub" font-size="11">41</tspan></text>
            <text x="321" y="428">U&#x0307;<tspan baseline-shift="sub" font-size="11">15</tspan></text>
            <text x="365" y="621">U&#x0307;<tspan baseline-shift="sub" font-size="11">52</tspan></text>
            <text x="265" y="595">U&#x0307;<tspan baseline-shift="sub" font-size="11">23</tspan></text>
        </g>

        <!-- Currents -->
        <g fill="black">
            <text x="260" y="180" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">1</tspan></text>
            <text x="460" y="295" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">2</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">3</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">4</tspan></text>
            <text x="650" y="540" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">5</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">6</tspan></text>
            <text x="610" y="675" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">7</tspan></text>
        </g>
    </g>

    <!-- ================= NODES ================= -->
    <g fill="#111">
        <circle cx="400" cy="450" r="4.5" />      <!-- Node 5 -->
        <circle cx="750.2" cy="143.4" r="4.5" />  <!-- Node 6 -->
        <circle cx="469.8" cy="338.5" r="4.5" />  <!-- Node 4 -->
        <circle cx="242.0" cy="396.0" r="4.5" />  <!-- Node 1 -->
        <circle cx="332.9" cy="397.1" r="4.5" />  <!-- Node 3 -->
        <circle cx="290.2" cy="793.0" r="4.5" />  <!-- Node 2 -->
    </g>

    <!-- Node Number Labels (Drawn last to stay on top) -->
    <g font-size="16" font-weight="bold" fill="black">
        <text x="380" y="470">5</text>
        <text x="765" y="138">6</text>
        <text x="485" y="335">4</text>
        <text x="220" y="390">1</text>
        <text x="310" y="390">3</text>
        <text x="305" y="810">2</text>
    </g>
</svg>