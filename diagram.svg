<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <!-- Адзіная чорная стрэлка для восей і ўсіх вектараў -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="black" />
    </marker>
  </defs>

  <!-- Белы фон -->
  <!-- Белы фон -->
  <rect width="1000" height="800" fill="white"/>

  <!-- ================= ВОСІ КААРДЫНАТ І ДВАЙНАЯ АЛІЧБОЎКА ================= -->
  <!-- Пачатак каардынат (0,0) у кропцы (650, 350) -->
  
  <!-- Гарызантальная вось (+1). Абрэзана злева -->
  <line x1="270" y1="350" x2="950" y2="350" stroke="black" stroke-width="1" marker-end="url(#arrow)" />
  <text x="935" y="335" font-family="Times New Roman, serif" font-size="14" font-style="italic">+1</text>
  
  <!-- Вертыкальная вось (+j). Абрэзана зверху і знізу -->
  <line x1="650" y1="740" x2="650" y2="200" stroke="black" stroke-width="1" marker-end="url(#arrow)" />
  <text x="665" y="210" font-family="Times New Roman, serif" font-size="14" font-style="italic">+j</text>

  <text x="635" y="340" font-family="Times New Roman, serif" font-size="12">0</text>

  <!-- Засечкі і подпісы шкал -->
  <!-- 50 пікселяў = 20 В (ніжні подпіс) = 1 А (верхні подпіс) -->
  <g stroke="black" stroke-width="1" font-family="Times New Roman, serif" font-size="7.5" fill="#666">
    <!-- Дадатная вось X -->
    <line x1="700" y1="347" x2="700" y2="353" /><text x="700" y="363" text-anchor="middle" stroke="none">20</text><text x="700" y="343" text-anchor="middle" stroke="none">1.0</text>
    <line x1="750" y1="347" x2="750" y2="353" /><text x="750" y="363" text-anchor="middle" stroke="none">40</text><text x="750" y="343" text-anchor="middle" stroke="none">2.0</text>
    <line x1="800" y1="347" x2="800" y2="353" /><text x="800" y="363" text-anchor="middle" stroke="none">60</text><text x="800" y="343" text-anchor="middle" stroke="none">3.0</text>
    <line x1="850" y1="347" x2="850" y2="353" /><text x="850" y="363" text-anchor="middle" stroke="none">80</text><text x="850" y="343" text-anchor="middle" stroke="none">4.0</text>
    <line x1="900" y1="347" x2="900" y2="353" /><text x="900" y="363" text-anchor="middle" stroke="none">100</text><text x="900" y="343" text-anchor="middle" stroke="none">5.0</text>

    <!-- Адмоўная вось X -->
    <line x1="600" y1="347" x2="600" y2="353" /><text x="600" y="363" text-anchor="middle" stroke="none">-20</text><text x="600" y="343" text-anchor="middle" stroke="none">-1.0</text>
    <line x1="550" y1="347" x2="550" y2="353" /><text x="550" y="363" text-anchor="middle" stroke="none">-40</text><text x="550" y="343" text-anchor="middle" stroke="none">-2.0</text>
    <line x1="500" y1="347" x2="500" y2="353" /><text x="500" y="363" text-anchor="middle" stroke="none">-60</text><text x="500" y="343" text-anchor="middle" stroke="none">-3.0</text>
    <line x1="450" y1="347" x2="450" y2="353" /><text x="450" y="363" text-anchor="middle" stroke="none">-80</text><text x="450" y="343" text-anchor="middle" stroke="none">-4.0</text>
    <line x1="400" y1="347" x2="400" y2="353" /><text x="400" y="363" text-anchor="middle" stroke="none">-100</text><text x="400" y="343" text-anchor="middle" stroke="none">-5.0</text>
    <line x1="350" y1="347" x2="350" y2="353" /><text x="350" y="363" text-anchor="middle" stroke="none">-120</text><text x="350" y="343" text-anchor="middle" stroke="none">-6.0</text>
    <line x1="300" y1="347" x2="300" y2="353" /><text x="300" y="363" text-anchor="middle" stroke="none">-140</text><text x="300" y="343" text-anchor="middle" stroke="none">-7.0</text>

    <!-- Дадатная вось Y (уверх) -->
    <line x1="647" y1="300" x2="653" y2="300" /><text x="643" y="303" text-anchor="end" stroke="none">20</text><text x="657" y="303" text-anchor="start" stroke="none">1.0</text>
    <line x1="647" y1="250" x2="653" y2="250" /><text x="643" y="253" text-anchor="end" stroke="none">40</text><text x="657" y="253" text-anchor="start" stroke="none">2.0</text>
    
    <!-- Адмоўная вось Y (уніз) -->
    <line x1="647" y1="400" x2="653" y2="400" /><text x="643" y="403" text-anchor="end" stroke="none">-20</text><text x="657" y="403" text-anchor="start" stroke="none">-1.0</text>
    <line x1="647" y1="450" x2="653" y2="450" /><text x="643" y="453" text-anchor="end" stroke="none">-40</text><text x="657" y="453" text-anchor="start" stroke="none">-2.0</text>
    <line x1="647" y1="500" x2="653" y2="500" /><text x="643" y="503" text-anchor="end" stroke="none">-60</text><text x="657" y="503" text-anchor="start" stroke="none">-3.0</text>
    <line x1="647" y1="550" x2="653" y2="550" /><text x="643" y="553" text-anchor="end" stroke="none">-80</text><text x="657" y="553" text-anchor="start" stroke="none">-4.0</text>
    <line x1="647" y1="600" x2="653" y2="600" /><text x="643" y="603" text-anchor="end" stroke="none">-100</text><text x="657" y="603" text-anchor="start" stroke="none">-5.0</text>
    <line x1="647" y1="650" x2="653" y2="650" /><text x="643" y="653" text-anchor="end" stroke="none">-120</text><text x="657" y="653" text-anchor="start" stroke="none">-6.0</text>
    <line x1="647" y1="700" x2="653" y2="700" /><text x="643" y="703" text-anchor="end" stroke="none">-140</text><text x="657" y="703" text-anchor="start" stroke="none">-7.0</text>
  </g>

  <!-- ================= ТАПАГРАФІЧНАЯ ДЫЯГРАМА НАПРУЖАННЯЎ ================= -->
  <!-- Вектары злучаюць вузлы-патэнцыялы: стрэлка ад вузла b да a для Uab -->
  <g stroke="black" stroke-width="1.2">
    <line x1="650.0" y1="350.0" x2="341.3" y2="291.3" marker-end="url(#arrow)" /> <!-- U31 (ад 1 да 3) -->
    <line x1="664.5" y1="444.9" x2="650.0" y2="350.0" marker-end="url(#arrow)" /> <!-- U15 (ад 5 да 1) -->
    <line x1="617.0" y1="452.2" x2="664.5" y2="444.9" marker-end="url(#arrow)" /> <!-- U54 (ад 4 да 5) -->
    <line x1="791.8" y1="425.5" x2="617.0" y2="452.2" marker-end="url(#arrow)" /> <!-- U46 (ад 6 да 4) -->
    <line x1="835.0" y1="511.7" x2="791.8" y2="425.5" marker-end="url(#arrow)" /> <!-- U62 (ад 2 да 6) -->
    <line x1="341.3" y1="291.3" x2="835.0" y2="511.7" marker-end="url(#arrow)" /> <!-- U23 (ад 3 да 2) -->
    <line x1="791.8" y1="425.5" x2="650.0" y2="350.0" marker-end="url(#arrow)" /> <!-- U16 (ад 6 да 1) -->
  </g>

  <!-- Абазначэнні вектараў напружанняў -->
  <g font-family="Times New Roman, serif" font-size="15" fill="black">
    <text x="470" y="300">U&#775;<tspan baseline-shift="sub" font-size="10">31</tspan></text>
    <text x="670" y="400">U&#775;<tspan baseline-shift="sub" font-size="10">15</tspan></text>
    <text x="625" y="470">U&#775;<tspan baseline-shift="sub" font-size="10">54</tspan></text>
    <text x="690" y="460">U&#775;<tspan baseline-shift="sub" font-size="10">46</tspan></text>
    <text x="825" y="475">U&#775;<tspan baseline-shift="sub" font-size="10">62</tspan></text>
    <text x="560" y="415">U&#775;<tspan baseline-shift="sub" font-size="10">23</tspan></text>
    <text x="735" y="380">U&#775;<tspan baseline-shift="sub" font-size="10">16</tspan></text>
  </g>

  <!-- Кропкі вузлоў (патэнцыялаў) і іх нумарацыя -->
  <g fill="black">
    <circle cx="650.0" cy="350.0" r="2.5" />
    <text x="635" y="365" font-family="Times New Roman, serif" font-size="14" font-weight="bold">1</text>
    
    <circle cx="835.0" cy="511.7" r="2.5" />
    <text x="845" y="525" font-family="Times New Roman, serif" font-size="14" font-weight="bold">2</text>
    
    <circle cx="341.3" cy="291.3" r="2.5" />
    <text x="320" y="285" font-family="Times New Roman, serif" font-size="14" font-weight="bold">3</text>
    
    <circle cx="617.0" cy="452.2" r="2.5" />
    <text x="590" y="465" font-family="Times New Roman, serif" font-size="14" font-weight="bold">4</text>
    
    <circle cx="664.5" cy="444.9" r="2.5" />
    <text x="680" y="460" font-family="Times New Roman, serif" font-size="14" font-weight="bold">5</text>
    
    <circle cx="791.8" cy="425.5" r="2.5" />
    <text x="805" y="415" font-family="Times New Roman, serif" font-size="14" font-weight="bold">6</text>
  </g>

  <!-- ================= ВЕКТАРЫ ТОКАЎ ================= -->
  <!-- Выходзяць строга з пачатку каардынат -->
  <g stroke="black" stroke-width="1.8">
    <line x1="650" y1="350" x2="601.0" y2="311.0" marker-end="url(#arrow)" />
    <line x1="650" y1="350" x2="643.5" y2="307.0" marker-end="url(#arrow)" />
    <line x1="650" y1="350" x2="608.0" y2="354.0" marker-end="url(#arrow)" />
    <line x1="650" y1="350" x2="503.0" y2="679.0" marker-end="url(#arrow)" />
  </g>

  <!-- Абазначэнні вектараў токаў (звычайны шрыфт) -->
  <g font-family="Times New Roman, serif" font-size="15" fill="black">
    <text x="535" y="300">I&#775;<tspan baseline-shift="sub" font-size="10">1</tspan>, I&#775;<tspan baseline-shift="sub" font-size="10">5</tspan></text>
    <text x="665" y="295">I&#775;<tspan baseline-shift="sub" font-size="10">2</tspan>, I&#775;<tspan baseline-shift="sub" font-size="10">3</tspan>, I&#775;<tspan baseline-shift="sub" font-size="10">4</tspan></text>
    <text x="580" y="380">I&#775;<tspan baseline-shift="sub" font-size="10">7</tspan></text>
    <text x="460" y="690">I&#775;<tspan baseline-shift="sub" font-size="10">6</tspan></text>
  </g>

</svg>