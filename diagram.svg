<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" width="100%" height="100%" style="background-color: white; font-family: sans-serif;">
    <defs>
        <style>
            /* Класс для добавления белого контура (вырезания фона) вокруг текста */
            .halo {
                paint-order: stroke fill;
                stroke: white;
                stroke-width: 6px;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
        </style>

        <!-- Arrowhead for Current vectors (black, solid) -->
        <marker id="arrow-i" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
        </marker>
        <!-- Arrowhead for Voltage drops (gray, solid) -->
        <marker id="arrow-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#444" />
        </marker>
        <!-- Arrowhead for Axes -->
        <marker id="arrow-axis" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#888" />
        </marker>
    </defs>

    <!-- ================= AXES ================= -->
    <g stroke="#888" stroke-width="1.5">
        <!-- X Axis (Real) -->
        <line x1="50" y1="450" x2="950" y2="450" marker-end="url(#arrow-axis)"/>
        <!-- Y Axis (Imaginary) -->
        <line x1="500" y1="850" x2="500" y2="30" marker-end="url(#arrow-axis)"/>
    </g>
    
    <!-- Axis Labels -->
    <text x="930" y="435" font-size="14" fill="#555" font-style="italic" class="halo">+1</text>
    <text x="515" y="40" font-size="14" fill="#555" font-style="italic" class="halo">+j</text>

    <!-- ================= TICKS AND GRID LABELS ================= -->
    <g font-size="11">
        <!-- X Axis Ticks (Step = 120px) -->
        <path d="M 140 445 L 140 455 M 260 445 L 260 455 M 380 445 L 380 455 M 620 445 L 620 455 M 740 445 L 740 455 M 860 445 L 860 455" stroke="#888" fill="none"/>
        
        <g text-anchor="middle">
            <!-- Voltages (Outer/Top) -->
            <g fill="#777" class="halo">
                <text x="140" y="440">-120</text>
                <text x="260" y="440">-80</text>
                <text x="380" y="440">-40</text>
                <text x="620" y="440">40</text>
                <text x="740" y="440">80</text>
                <text x="860" y="440">120</text>
            </g>
            <!-- Currents (Inner/Bottom) -->
            <g fill="black" class="halo">
                <text x="140" y="468">-6.0</text>
                <text x="260" y="468">-4.0</text>
                <text x="380" y="468">-2.0</text>
                <text x="620" y="468">2.0</text>
                <text x="740" y="468">4.0</text>
                <text x="860" y="468">6.0</text>
            </g>
        </g>

        <!-- Y Axis Ticks (Step = 120px) -->
        <path d="M 495 90 L 505 90 M 495 210 L 505 210 M 495 330 L 505 330 M 495 570 L 505 570 M 495 690 L 505 690 M 495 810 L 505 810" stroke="#888" fill="none"/>
        
        <g alignment-baseline="middle">
            <!-- Voltages (Outer/Left) -->
            <g fill="#777" text-anchor="end" class="halo">
                <text x="490" y="90">120</text>
                <text x="490" y="210">80</text>
                <text x="490" y="330">40</text>
                <text x="490" y="570">-40</text>
                <text x="490" y="690">-80</text>
                <text x="490" y="810">-120</text>
            </g>
            <!-- Currents (Inner/Right) -->
            <g fill="black" text-anchor="start" class="halo">
                <text x="510" y="90">6.0</text>
                <text x="510" y="210">4.0</text>
                <text x="510" y="330">2.0</text>
                <text x="510" y="570">-2.0</text>
                <text x="510" y="690">-4.0</text>
                <text x="510" y="810">-6.0</text>
            </g>
        </g>
    </g>

    <!-- ================= VOLTAGE TOPOLOGY (NODES & LINES) ================= -->
    <g stroke="#444" stroke-width="1.5" marker-end="url(#arrow-v)">
        <!-- U_15: 1 -> 5 -->
        <line x1="500" y1="450" x2="517.4" y2="563.9" />
        <!-- U_54: 5 -> 4 -->
        <line x1="517.4" y1="563.9" x2="460.5" y2="572.6" />
        <!-- U_46: 4 -> 6 -->
        <line x1="460.5" y1="572.6" x2="670.1" y2="540.5" />
        <!-- U_16: 1 -> 6 -->
        <line x1="500" y1="450" x2="670.1" y2="540.5" />
        <!-- U_62: 6 -> 2 -->
        <line x1="670.1" y1="540.5" x2="721.9" y2="644.0" />
        <!-- U_23: 2 -> 3 -->
        <line x1="721.9" y1="644.0" x2="129.6" y2="379.6" />
        <!-- U_31: 3 -> 1 -->
        <line x1="129.6" y1="379.6" x2="500" y2="450" />
    </g>

    <!-- ================= CURRENT VECTORS ================= -->
    <g stroke="black" stroke-width="2.5" marker-end="url(#arrow-i)">
        <!-- I1, I5 = -0.98 + j0.78 -->
        <line x1="500" y1="450" x2="441.2" y2="403.2" />
        <!-- I6 = 2.94 + j6.58 -->
        <line x1="500" y1="450" x2="676.4" y2="55.2" />
        <!-- I2, I3, I4 = -0.13 + j0.86 -->
        <line x1="500" y1="450" x2="492.2" y2="398.4" />
        <!-- I7 = -0.84 - j0.08 -->
        <line x1="500" y1="450" x2="449.6" y2="454.8" />
    </g>

    <!-- ================= LABELS (With Halo) ================= -->
    <g font-size="16" font-style="italic" text-anchor="middle">
        
        <!-- === HALO LAYER === -->
        <g class="halo">
            <!-- Voltages -->
            <text x="540" y="515">U&#x0307;<tspan baseline-shift="sub" font-size="11">15</tspan></text>
            <text x="488" y="595">U&#x0307;<tspan baseline-shift="sub" font-size="11">54</tspan></text>
            <text x="565" y="575">U&#x0307;<tspan baseline-shift="sub" font-size="11">46</tspan></text>
            <text x="585" y="470">U&#x0307;<tspan baseline-shift="sub" font-size="11">16</tspan></text>
            <text x="735" y="592">U&#x0307;<tspan baseline-shift="sub" font-size="11">62</tspan></text>
            <text x="420" y="535">U&#x0307;<tspan baseline-shift="sub" font-size="11">23</tspan></text>
            <text x="300" y="395">U&#x0307;<tspan baseline-shift="sub" font-size="11">31</tspan></text>

            <!-- Currents -->
            <text x="410" y="390" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">1</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">5</tspan></text>
            <text x="700" y="60" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">6</tspan></text>
            <text x="540" y="385" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">2</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">3</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">4</tspan></text>
            <text x="425" y="480" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">7</tspan></text>
        </g>

        <!-- === FOREGROUND TEXT LAYER === -->
        <g fill="#222">
            <!-- Voltages -->
            <text x="540" y="515">U&#x0307;<tspan baseline-shift="sub" font-size="11">15</tspan></text>
            <text x="488" y="595">U&#x0307;<tspan baseline-shift="sub" font-size="11">54</tspan></text>
            <text x="565" y="575">U&#x0307;<tspan baseline-shift="sub" font-size="11">46</tspan></text>
            <text x="585" y="470">U&#x0307;<tspan baseline-shift="sub" font-size="11">16</tspan></text>
            <text x="735" y="592">U&#x0307;<tspan baseline-shift="sub" font-size="11">62</tspan></text>
            <text x="420" y="535">U&#x0307;<tspan baseline-shift="sub" font-size="11">23</tspan></text>
            <text x="300" y="395">U&#x0307;<tspan baseline-shift="sub" font-size="11">31</tspan></text>
        </g>
        <g fill="black">
            <!-- Currents -->
            <text x="410" y="390" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">1</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">5</tspan></text>
            <text x="700" y="60" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">6</tspan></text>
            <text x="540" y="385" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">2</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">3</tspan>, I&#x0307;<tspan baseline-shift="sub" font-size="12">4</tspan></text>
            <text x="425" y="480" font-weight="bold">I&#x0307;<tspan baseline-shift="sub" font-size="12">7</tspan></text>
        </g>
    </g>

    <!-- ================= NODES ================= -->
    <g fill="#111">
        <circle cx="500" cy="450" r="4.5" />      <!-- Node 1 -->
        <circle cx="517.4" cy="563.9" r="4.5" />  <!-- Node 5 -->
        <circle cx="460.5" cy="572.6" r="4.5" />  <!-- Node 4 -->
        <circle cx="670.1" cy="540.5" r="4.5" />  <!-- Node 6 -->
        <circle cx="721.9" cy="644.0" r="4.5" />  <!-- Node 2 -->
        <circle cx="129.6" cy="379.6" r="4.5" />  <!-- Node 3 -->
    </g>

    <!-- Node Number Labels (Drawn last to stay on top) -->
    <g font-size="16" font-weight="bold" fill="black" class="halo">
        <text x="515" y="440">1</text>
        <text x="535" y="570">5</text>
        <text x="440" y="585">4</text>
        <text x="685" y="530">6</text>
        <text x="740" y="650">2</text>
        <text x="110" y="370">3</text>
    </g>
    <g font-size="16" font-weight="bold" fill="black">
        <text x="515" y="440">1</text>
        <text x="535" y="570">5</text>
        <text x="440" y="585">4</text>
        <text x="685" y="530">6</text>
        <text x="740" y="650">2</text>
        <text x="110" y="370">3</text>
    </g>
</svg>